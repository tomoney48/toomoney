<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    text-align:center;
    margin-top:50px;
    overflow:hidden;
  }

  .card {
    width:300px;
    height:200px;
    margin:auto;
    position:relative;
  }

  .result {
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    border:2px solid black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
    z-index:1;
  }

  .cover {
    position:absolute;
    width:100%;
    height:100%;
    z-index:2;
    cursor:pointer;
    overflow:hidden;
  }

  .cover img {
    width:100%;
    height:100%;
    transition: transform 0.6s ease, opacity 0.6s;
  }

  .opened img {
    transform: translateX(100%);
    opacity:0;
  }

  /* 🎆 폭죽 */
  .firework {
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    animation: explode 1s ease-out forwards;
  }

  @keyframes explode {
    0% { transform: translate(0,0); opacity:1; }
    100% { transform: translate(var(--x), var(--y)); opacity:0; }
  }
</style>
</head>

<body>

<h2>복권을 클릭해서 뜯으세요</h2>

<div class="card">
  <div class="result" id="result"></div>

  <div class="cover" id="cover">
    <img src="cover.png">
  </div>
</div>

<script>
let params = new URLSearchParams(location.search);
let result = params.get("result");

document.getElementById("result").innerText = result;

document.getElementById("cover").onclick = function() {
  this.classList.add("opened");

  // 🎆 S 나오면 폭죽
  if (result === "S") {
    for (let i = 0; i < 40; i++) {
      let fw = document.createElement("div");
      fw.className = "firework";

      fw.style.left = "50%";
      fw.style.top = "50%";

      fw.style.setProperty("--x", (Math.random()*400-200)+"px");
      fw.style.setProperty("--y", (Math.random()*400-200)+"px");

      fw.style.background = `hsl(${Math.random()*360},100%,50%)`;

      document.body.appendChild(fw);

      setTimeout(() => fw.remove(), 1000);
    }
  }
};
</script>

</body>
</html>
