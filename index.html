<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제일복권</title>

<style>
  body {
    margin:0;
    font-family:sans-serif;
    background:#000;
    color:white;
    text-align:center;
  }

  .screen { display:none; }
  .active { display:block; }

  button {
    padding:10px 20px;
    margin:5px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
  }

  /* 남은 개수 */
  .remain-box {
    position:fixed;
    right:20px;
    top:20px;
    background:#111;
    padding:15px 20px;
    border-radius:10px;
    font-size:20px;
    box-shadow:0 0 10px rgba(255,255,255,0.2);
  }

  /* 선택 화면 */
  .grid {
    display:grid;
    grid-template-columns:repeat(10, 80px);
    gap:12px;
    justify-content:center;
    margin-top:20px;
  }

  .box {
    width:80px;
    height:80px;
    background:white;
    color:black;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:20px;
    cursor:pointer;
  }

  .used { pointer-events:none; }

  /* 복권 */
  .card {
    width:900px;
    height:450px;
    margin:auto;
    margin-top:180px;
    position:relative;
  }

  .result {
    position:absolute;
    width:100%;
    height:100%;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:120px;
    font-weight:bold;
  }

  .cover {
    position:absolute;
    width:100%;
    height:100%;
    cursor:pointer;
  }

  .cover img {
    width:100%;
    height:100%;
    transition: transform 0.7s ease, opacity 0.7s;
  }

  .opened img {
    transform: translateX(100%);
    opacity:0;
  }

  .firework {
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    animation: explode 1s ease-out forwards;
  }

  @keyframes explode {
    0% { transform:translate(0,0); opacity:1; }
    100% { transform:translate(var(--x), var(--y)); opacity:0; }
  }
</style>

</head>

<body>

<!-- 남은 개수 -->
<div class="remain-box">
  남은 개수: <span id="remain">100</span>
</div>

<!-- 선택 화면 -->
<div id="selectScreen" class="screen active">
  <h1>🎁 제일복권</h1>
  <button onclick="randomPick()">🎲 랜덤 선택</button>
  <button onclick="goFull()">📺 전체화면</button>
  <div class="grid" id="grid"></div>
</div>

<!-- 뜯기 화면 -->
<div id="drawScreen" class="screen">

  <h1>🎟️ 복권을 뜯어보세요</h1>

  <!-- 위쪽 여백 (상품 이미지 자리용) -->
  <div style="height:120px;"></div>

  <div class="card">
    <div class="result" id="result"></div>

    <div class="cover" id="cover">
      <img src="cover.png">
    </div>
  </div>

  <button onclick="goBack()">다시 뽑기</button>

</div>

<script>
// 🎯 상품 구성
let prizes = [
  "S",
  "A",
  "B","B",
  "C","C",
  "D","D",
  "E","E",
  "F","F",
  "G","G","G","G",
  "H","H","H","H",
  "I","I","I","I",
  "J","J","J","J",
  ...Array(72).fill("K") // ⭐ 수정 완료
];

prizes.sort(() => Math.random() - 0.5);

const grid = document.getElementById("grid");
let boxes = [];
let remain = 100;
let exploded = false;

for (let i = 0; i < 100; i++) {
  let box = document.createElement("div");
  box.className = "box";
  box.innerText = i + 1;

  box.onclick = () => pick(box, i);

  boxes.push(box);
  grid.appendChild(box);
}

function pick(box, i) {
  let result = prizes[i];

  box.innerText = result;
  box.classList.add("used");

  // 색상
  if(result === "S") box.style.background = "gold";
  else if(result === "A") box.style.background = "#ff7675";
  else if(result === "B") box.style.background = "#74b9ff";
  else if(result === "C") box.style.background = "#55efc4";
  else if(result === "D") box.style.background = "#ffeaa7";
  else if(result === "E") box.style.background = "#fab1a0";
  else if(result === "F") box.style.background = "#dfe6e9";
  else if(result === "G") box.style.background = "#a29bfe";
  else if(result === "H") box.style.background = "#81ecec";
  else if(result === "I") box.style.background = "#fab1a0";
  else if(result === "J") box.style.background = "#ffeaa7";
  else box.style.background = "#636e72"; // K

  // 남은 개수
  remain--;
  document.getElementById("remain").innerText = remain;

  document.getElementById("selectScreen").classList.remove("active");
  document.getElementById("drawScreen").classList.add("active");

  let resultEl = document.getElementById("result");
  resultEl.innerText = result;

  // 텍스트 색
  if(result === "S") resultEl.style.color = "gold";
  else if(result === "A") resultEl.style.color = "#ff7675";
  else if(result === "B") resultEl.style.color = "#74b9ff";
  else if(result === "C") resultEl.style.color = "#55efc4";
  else resultEl.style.color = "white";

  let cover = document.getElementById("cover");
  cover.classList.remove("opened");
  exploded = false;

  cover.onclick = function() {
    cover.classList.add("opened");

    if (!exploded) {
      exploded = true;

      for (let i = 0; i < 60; i++) {
        let fw = document.createElement("div");
        fw.className = "firework";

        fw.style.left = "50%";
        fw.style.top = "50%";

        fw.style.setProperty("--x", (Math.random()*800-400)+"px");
        fw.style.setProperty("--y", (Math.random()*800-400)+"px");

        fw.style.background = `hsl(${Math.random()*360},100%,50%)`;

        document.body.appendChild(fw);
        setTimeout(() => fw.remove(), 1000);
      }
    }
  };
}

function randomPick() {
  let available = boxes.filter(b => !b.classList.contains("used"));
  if (available.length === 0) return;

  let randomBox = available[Math.floor(Math.random()*available.length)];
  randomBox.click();
}

function goFull() {
  document.documentElement.requestFullscreen();
}

function goBack() {
  document.getElementById("drawScreen").classList.remove("active");
  document.getElementById("selectScreen").classList.add("active");
}
</script>

</body>
</html>
